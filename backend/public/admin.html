<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>越南语纠音后台</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="layout">
      <section class="auth-card">
        <div>
          <p class="eyebrow">Access Control</p>
          <h2>管理员登录</h2>
          <p id="auth-hint" class="subtitle">请输入后台密码后再编辑内容。</p>
        </div>
        <div class="inline-form">
          <input id="admin-password" type="password" placeholder="输入管理员密码" />
          <button id="admin-login" class="btn btn-primary">登录后台</button>
          <button id="admin-logout" class="btn hidden">退出登录</button>
        </div>
      </section>

      <div id="admin-shell" class="locked">
      <header class="hero">
        <div>
          <p class="eyebrow">Admin Console</p>
          <h1>越南语纠音训练后台</h1>
          <p class="subtitle">今晚先把内容编辑、兑换码管理、用户查看和本地备份流程跑稳。</p>
        </div>
        <div class="hero-actions">
          <button id="reload-all" class="btn btn-primary">刷新全部</button>
          <div id="status" class="status info">准备就绪</div>
        </div>
      </header>

      <section class="grid two-col">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>兑换码</h2>
              <p>创建新兑换码并查看使用状态。</p>
            </div>
            <div class="inline-form">
              <input id="redeem-code-input" type="text" placeholder="例如：VIET-2026-BATCH-01" />
              <button id="create-redeem-code" class="btn">新增兑换码</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>兑换码</th><th>状态</th><th>使用者</th><th>时间</th></tr>
              </thead>
              <tbody id="redeem-code-body"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>用户列表</h2>
              <p>查看账号、手机号、当前体系和开通状态。</p>
            </div>
            <button id="refresh-users" class="btn">刷新用户</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>昵称</th><th>手机号</th><th>体系</th><th>开通</th><th>更新时间</th></tr>
              </thead>
              <tbody id="user-body"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="grid two-col editors">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>试听内容</h2>
              <p>支持北越 / 南越切换。保存前会先校验字段并自动备份。</p>
            </div>
            <div class="button-row">
              <button class="btn tab active" data-trial-dialect="north">北越</button>
              <button class="btn tab" data-trial-dialect="south">南越</button>
              <button id="format-trial" class="btn">格式化</button>
              <button id="save-trial" class="btn btn-primary">保存试听</button>
            </div>
          </div>
          <textarea id="trial-editor" spellcheck="false"></textarea>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>课程目录</h2>
              <p>保存时自动做结构校验，并写入备份到 <code>storage/backups</code>。</p>
            </div>
            <div class="button-row">
              <button id="format-catalog" class="btn">格式化</button>
              <button id="save-catalog" class="btn btn-primary">保存目录</button>
            </div>
          </div>
          <textarea id="catalog-editor" spellcheck="false"></textarea>
        </article>
      </section>
      </div>
    </main>

    <script src="/admin/admin.js"></script>
  </body>
</html>
